services:
  postgres:
    image: postgres:15-alpine
    container_name: medusa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network

  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - medusa_network

  medusa:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - backend_env
    container_name: medusa_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    working_dir: /app
    ports:
      - "9000:9000"
    environment:
      NODE_ENV: production
      PORT: 9000
    env_file:
      - apps/backend/.env
    networks:
      - medusa_network

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      secrets:
        - storefront_env
    container_name: medusa_storefront
    restart: unless-stopped
    depends_on:
      - medusa
    working_dir: /server/apps/storefront
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
    env_file:
      - apps/storefront/.env
    networks:
      - medusa_network

volumes:
  postgres_data:

networks:
  medusa_network:
    driver: bridge

secrets:
  backend_env:
    file: ./apps/backend/.env
  storefront_env:
    file: ./apps/storefront/.env
