# HTTPS-only local/dev reverse proxy for Ayden Medusa.
#
# Replace these values before use:
# - 192.168.86.XXX with the Docker host IP running this project.
# - /etc/letsencrypt/live/... paths with your certificate paths.
#
# Browser traffic should only use HTTPS FQDNs:
# - Admin/backend: https://ridersadmin.nchehab.ddns.net/app
# - Storefront:     https://riders.nchehab.ddns.net
#
# Do not browse to http://<ip>:9000, http://<ip>:8000, or http://<ip>:5173.
# Those are internal proxy targets only.

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream medusa_backend {
  server 192.168.86.XXX:9000;
}

upstream medusa_admin_vite_hmr {
  server 192.168.86.XXX:5173;
}

upstream medusa_storefront {
  server 192.168.86.XXX:8000;
}

server {
  listen 80;
  server_name ridersadmin.nchehab.ddns.net riders.nchehab.ddns.net;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name ridersadmin.nchehab.ddns.net;

  ssl_certificate /etc/letsencrypt/live/ridersadmin.nchehab.ddns.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ridersadmin.nchehab.ddns.net/privkey.pem;

  client_max_body_size 50m;

  location / {
    proxy_pass http://medusa_backend;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  # Vite HMR websocket path. This keeps the browser on wss://ridersadmin...:443
  # while the proxy talks to the dev HMR server on port 5173.
  location /@vite {
    proxy_pass http://medusa_admin_vite_hmr;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

server {
  listen 443 ssl http2;
  server_name riders.nchehab.ddns.net;

  ssl_certificate /etc/letsencrypt/live/riders.nchehab.ddns.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/riders.nchehab.ddns.net/privkey.pem;

  client_max_body_size 50m;

  location / {
    proxy_pass http://medusa_storefront;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
